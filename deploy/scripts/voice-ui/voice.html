<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VOA Voice</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: transparent; overflow: hidden;
      font-family: "Segoe UI", Tahoma, sans-serif;
      pointer-events: none;
      user-select: none;
    }
    #voa-voice-hud {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 2147483646;
      min-width: 140px;
      padding: 10px 14px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(18, 22, 30, 0.82), rgba(8, 10, 14, 0.88));
      border: 1px solid rgba(201, 162, 39, 0.45);
      color: #e8e6e3;
      text-shadow: 0 1px 2px rgba(0,0,0,.85);
      box-shadow: 0 8px 24px rgba(0,0,0,.45);
      opacity: 0.92;
      transition: border-color .15s, background .15s;
    }
    #voa-voice-hud.talking {
      border-color: rgba(80, 200, 120, 0.85);
      background: linear-gradient(180deg, rgba(16, 40, 28, 0.88), rgba(8, 18, 14, 0.92));
    }
    #voa-voice-hud.disabled { opacity: 0.55; border-color: rgba(120,120,120,.4); }
    #voa-voice-title {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #c9a227;
      margin-bottom: 4px;
    }
    #voa-voice-mode {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    #voa-voice-status {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 3px;
    }
    #voa-voice-peers {
      font-size: 10px;
      opacity: 0.65;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="voa-voice-hud" class="disabled">
    <div id="voa-voice-title">Proximity voice</div>
    <div id="voa-voice-mode">NORMAL</div>
    <div id="voa-voice-status">Connecting…</div>
    <div id="voa-voice-peers"></div>
  </div>
  <!-- livekit-client UMD; replace with self-hosted CDN in production if needed -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.9.9/dist/livekit-client.umd.min.js"></script>
  <script src="./voice-app.js"></script>
</body>
</html>
